# Production-style stack: nginx serves built frontend + proxies API
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
#   open http://localhost

name: lugha

services:
  mysql:
    image: mysql:8.0
    container_name: lugha-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-lugha_db}
      MYSQL_USER: ${DB_APP_USER:-lugha}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./lugha_mvp/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - lugha

  backend:
    build:
      context: ./lugha_mvp/backend
      dockerfile: Dockerfile
    container_name: lugha-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_APP_USER:-lugha}
      UVICORN_RELOAD: "0"
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    networks:
      - lugha

  frontend:
    build:
      context: ./lugha_mvp/frontend
      dockerfile: Dockerfile.prod
    container_name: lugha-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lugha

volumes:
  mysql_data:
    name: lugha_mysql_data

networks:
  lugha:
    name: lugha_network
